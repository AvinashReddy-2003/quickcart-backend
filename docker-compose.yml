services:
  postgres:
    image: postgres:16-alpine
    container_name: quickcart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: quickcart
      POSTGRES_PASSWORD: quickcart
      POSTGRES_DB: quickcart
    ports:
      - "5432:5432"
    volumes:
      - quickcart_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quickcart"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quickcart-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - quickcart_redisdata:/data

volumes:
  quickcart_pgdata:
  quickcart_redisdata:
